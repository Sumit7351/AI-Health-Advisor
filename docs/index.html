<!doctype html>
<html lang="en" class="h-full">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>AI Health Advisor: Intelligent Medical Assistance System</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/lucide@latest"></script>
	<script>
		tailwind.config = {
			darkMode: 'class',
			theme: {
				extend: {
					fontFamily: {
						sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
					},
				},
			},
		}
	</script>
	<style type="text/tailwindcss">
		@layer utilities {
			.backdrop-blur-glass {
				backdrop-filter: blur(20px);
				-webkit-backdrop-filter: blur(20px);
			}
			.transition-spring {
				transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
			}
		}
	</style>
	<style>
		.slide {
			opacity: 0;
			transform: scale(0.98) translateX(30px);
			transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
			pointer-events: none;
		}
		.slide.active {
			opacity: 1;
			transform: scale(1) translateX(0);
			pointer-events: auto;
		}
		.slide.exit-left {
			opacity: 0;
			transform: scale(0.98) translateX(-30px);
		}
		.nav-arrow:hover {
			transform: translateY(-50%) scale(1.05);
		}
		.nav-arrow:active {
			transform: translateY(-50%) scale(0.98);
		}
		.dropdown.open .dropdown-menu {
			opacity: 1;
			visibility: visible;
			transform: translateY(0) scale(1);
		}
		.submenu:hover .submenu-content {
			opacity: 1;
			visibility: visible;
			transform: translateX(0);
		}
		.thumbnails-panel.visible {
			opacity: 1;
			visibility: visible;
			transform: translateX(-50%) translateY(0);
		}
		.thumb-item {
			cursor: grab;
			user-select: none;
		}
		.thumb-item:active {
			cursor: grabbing;
		}
		.thumb-item.dragging {
			opacity: 0.4;
			transform: scale(0.9);
		}
		.thumb-item.drag-over {
			transform: scale(1.1);
			border-color: #3b82f6 !important;
			opacity: 1 !important;
		}

		/* Portrait mode - show warning */
		@media (max-width: 768px) and (orientation: portrait) {
			.rotate-warning { display: flex; }
			body { display: none; }
		}

		/* Landscape mode optimizations */
		@media (orientation: landscape) and (max-height: 600px) {
			#slideWrapper {
				width: min(92vw, calc((100vh - 36px) * 16 / 9)) !important;
			}
			#topCounter {
				top: 6px !important;
				padding: 2px 6px !important;
				gap: 2px !important;
			}
			#prevArrow,
			#nextArrow {
				width: 40px !important;
				height: 40px !important;
			}
			#prevArrow {
				left: 12px !important;
			}
			#nextArrow {
				right: 12px !important;
			}
			#prevArrow i,
			#nextArrow i {
				width: 18px !important;
				height: 18px !important;
			}
			.tools-bottom {
				bottom: 4px !important;
				left: 8px !important;
			}
			.tools-bottom button {
				width: 24px !important;
				height: 24px !important;
			}
			.tools-bottom button i {
				width: 14px !important;
				height: 14px !important;
			}
			#thumbnailsPanel {
				bottom: 32px !important;
			}
		}

		/* Portrait desktop mode */
		@media (orientation: portrait) and (min-width: 769px) {
			#slideWrapper {
				width: min(85vw, calc((100vh - 40px) * 16 / 9)) !important;
			}
		}
	</style>
</head>
<body class="h-full bg-neutral-50 dark:bg-neutral-900 text-neutral-900 dark:text-neutral-50 font-sans overflow-hidden antialiased flex items-center justify-center transition-colors duration-300">
	<!-- Rotate warning -->
	<div class="rotate-warning hidden fixed inset-0 bg-white z-[9999] flex-col items-center justify-center gap-5 text-center p-10">
		<i data-lucide="smartphone-rotate" class="w-14 h-14 text-neutral-400"></i>
		<p class="text-[15px] text-neutral-500 max-w-[260px] leading-relaxed">Please rotate your device to landscape mode for the best viewing experience</p>
	</div>

	<!-- Top left counter -->
	<div id="topCounter" class="fixed left-1/2 top-2 -translate-x-1/2 flex items-center gap-1 px-1.5 py-1 bg-white/90 dark:bg-neutral-800/90 backdrop-blur-glass border border-black/[0.05] dark:border-white/10 rounded-full shadow-sm z-[1000] opacity-0 transition-opacity duration-300"
		 onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0">
		<button id="prevBtn" disabled title="Previous (←)"
			class="w-5 h-5 md:w-6 md:h-6 flex items-center justify-center rounded bg-transparent text-neutral-400 dark:text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-700 hover:text-neutral-700 dark:hover:text-neutral-300 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
			<i data-lucide="chevron-left" class="w-3 h-3 md:w-3.5 md:h-3.5"></i>
		</button>
		<div class="text-[11px] md:text-xs font-medium text-neutral-600 dark:text-neutral-300 min-w-[32px] md:min-w-[36px] text-center tabular-nums">
			<span id="currentSlide">1</span>
			<span class="text-neutral-300 dark:text-neutral-600">/</span>
			<span class="text-neutral-400 dark:text-neutral-500" id="totalSlides">10</span>
		</div>
		<button id="nextBtn" title="Next (→)"
			class="w-5 h-5 md:w-6 md:h-6 flex items-center justify-center rounded bg-transparent text-neutral-400 dark:text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-700 hover:text-neutral-700 dark:hover:text-neutral-300 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
			<i data-lucide="chevron-right" class="w-3 h-3 md:w-3.5 md:h-3.5"></i>
		</button>
		<div class="w-10 md:w-12 h-[2px] bg-black/[0.06] dark:bg-white/10 rounded-full overflow-hidden ml-0.5 md:ml-1">
			<div id="progressFill" class="h-full bg-neutral-500 dark:bg-neutral-300 rounded-full transition-all duration-300"></div>
		</div>
	</div>

	<!-- Slides -->
	<div id="slideWrapper" class="relative w-[min(90vw,calc((94vh-40px)*16/9))] aspect-video rounded-2xl overflow-hidden group">
		<div class="slide absolute inset-0" data-index="0">
			<img src="https://r2-bucket.flowith.net/f/eb5e50517ab7c8f5/ai_health_advisor_cover_slide_1%404096x2286.jpeg" alt="Slide 1" class="w-full h-full object-cover bg-neutral-50" />
		</div>
		<div class="slide absolute inset-0" data-index="1">
			<img src="https://r2-bucket.flowith.net/f/36fd99e148c8f2c9/healthcare_accessibility_crisis_slide_2%404096x2286.jpeg" alt="Slide 2" class="w-full h-full object-cover bg-neutral-50" />
		</div>
		<div class="slide absolute inset-0" data-index="2">
			<img src="https://r2-bucket.flowith.net/f/1260c4c32c5406dc/ai_health_advisor_triage_system_slide_3%404096x2286.jpeg" alt="Slide 3" class="w-full h-full object-cover bg-neutral-50" />
		</div>
		<div class="slide absolute inset-0" data-index="3">
			<img src="https://r2-bucket.flowith.net/f/85f368222c797094/system_architecture_mvc_design_slide_4%404096x2286.jpeg" alt="Slide 4" class="w-full h-full object-cover bg-neutral-50" />
		</div>
		<div class="slide absolute inset-0" data-index="4">
			<img src="https://r2-bucket.flowith.net/f/ac9f45fabc2a3dcb/technology_stack_medical_precision_slide_5%404096x2286.jpeg" alt="Slide 5" class="w-full h-full object-cover bg-neutral-50" />
		</div>
		<div class="slide absolute inset-0" data-index="5">
			<img src="https://r2-bucket.flowith.net/f/6fa2fe1844be7b2a/clinical_data_preprocessing_visualization_slide_6%404096x2286.jpeg" alt="Slide 6" class="w-full h-full object-cover bg-neutral-50" />
		</div>
		<div class="slide absolute inset-0" data-index="6">
			<img src="https://r2-bucket.flowith.net/f/0aa8f40cae104f8e/model_training_selection_comparison_slide_7%404096x2286.jpeg" alt="Slide 7" class="w-full h-full object-cover bg-neutral-50" />
		</div>
		<div class="slide absolute inset-0" data-index="7">
			<img src="https://r2-bucket.flowith.net/f/3d97e59fad4a9caf/explainable_ai_clinical_workflow_slide_8%404096x2286.jpeg" alt="Slide 8" class="w-full h-full object-cover bg-neutral-50" />
		</div>
		<div class="slide absolute inset-0" data-index="8">
			<img src="https://r2-bucket.flowith.net/f/9482839353362edb/healthcare_system_features_challenges_slide_9%404096x2286.jpeg" alt="Slide 9" class="w-full h-full object-cover bg-neutral-50" />
		</div>
		<div class="slide absolute inset-0" data-index="9">
			<img src="https://r2-bucket.flowith.net/f/ee8eadd229b11656/ai_health_advisor_conclusion_future_scope_slide_10%404096x2286.jpeg" alt="Slide 10" class="w-full h-full object-cover bg-neutral-50" />
		</div>
	</div>

	<!-- Navigation arrows -->
	<button id="prevArrow" disabled
		class="nav-arrow fixed top-1/2 left-8 -translate-y-1/2 w-[52px] h-[52px] flex items-center justify-center border border-black/[0.06] dark:border-white/10 rounded-full bg-white/85 dark:bg-neutral-800/85 backdrop-blur-glass text-neutral-500 dark:text-neutral-400 shadow-md opacity-0 hover:opacity-100 hover:bg-neutral-900 dark:hover:bg-white hover:border-neutral-900 dark:hover:border-white hover:text-white dark:hover:text-neutral-900 hover:shadow-lg disabled:!opacity-0 disabled:pointer-events-none z-50 transition-all duration-300">
		<i data-lucide="chevron-left" class="w-[22px] h-[22px]"></i>
	</button>
	<button id="nextArrow"
		class="nav-arrow fixed top-1/2 right-8 -translate-y-1/2 w-[52px] h-[52px] flex items-center justify-center border border-black/[0.06] dark:border-white/10 rounded-full bg-white/85 dark:bg-neutral-800/85 backdrop-blur-glass text-neutral-500 dark:text-neutral-400 shadow-md opacity-0 hover:opacity-100 hover:bg-neutral-900 dark:hover:bg-white hover:border-neutral-900 dark:hover:border-white hover:text-white dark:hover:text-neutral-900 hover:shadow-lg disabled:!opacity-0 disabled:pointer-events-none z-50 transition-all duration-300">
		<i data-lucide="chevron-right" class="w-[22px] h-[22px]"></i>
	</button>

	<!-- Thumbnails panel -->
	<div id="thumbnailsPanel"
		class="thumbnails-panel fixed bottom-4 left-1/2 -translate-x-1/2 translate-y-2 flex gap-1.5 p-1.5 bg-white/95 dark:bg-neutral-800/95 backdrop-blur-glass border border-black/[0.05] dark:border-white/10 rounded-lg shadow-md opacity-0 invisible transition-all duration-300 transition-spring z-[90] max-w-[calc(100vw-64px)] overflow-x-auto scrollbar-thin scrollbar-thumb-neutral-400">
	</div>

	<!-- Tools - bottom left -->
	<div class="tools-bottom fixed bottom-5 left-5 flex items-center z-[100] transition-all">
		<div class="dropdown relative">
			<button id="toolsBtn" title="Tools"
				class="w-7 h-7 flex items-center justify-center rounded bg-transparent text-neutral-400 dark:text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800 hover:text-neutral-600 dark:hover:text-neutral-300 transition-all">
				<i data-lucide="more-vertical" class="w-4 h-4"></i>
			</button>
			<div class="dropdown-menu absolute bottom-[calc(100%+6px)] md:bottom-[calc(100%+8px)] left-0 min-w-[130px] md:min-w-[140px] bg-white/95 dark:bg-neutral-800/95 backdrop-blur-glass border border-black/[0.05] dark:border-white/10 rounded-lg shadow-md p-1 opacity-0 invisible translate-y-2 scale-[0.96] transition-all duration-200 transition-spring z-[200]">
				<button id="thumbnailToggle"
					class="flex items-center gap-2 w-full px-2.5 py-2 rounded bg-transparent text-neutral-700 dark:text-neutral-300 text-xs font-medium hover:bg-neutral-100 dark:hover:bg-neutral-700 transition-all text-left">
					<i data-lucide="layout-grid" class="w-3.5 h-3.5 text-neutral-400 dark:text-neutral-500"></i>
					<span>Thumbnails</span>
				</button>
				<button id="themeToggle"
					class="flex items-center gap-2 w-full px-2.5 py-2 rounded bg-transparent text-neutral-700 dark:text-neutral-300 text-xs font-medium hover:bg-neutral-100 dark:hover:bg-neutral-700 transition-all text-left">
					<i data-lucide="moon" class="w-3.5 h-3.5 text-neutral-400 dark:text-neutral-500"></i>
					<span>Dark Mode</span>
				</button>
				<div class="h-px bg-black/[0.05] dark:bg-white/10 my-1"></div>
				<div class="submenu relative">
					<button class="flex items-center justify-between w-full px-2.5 py-2 rounded bg-transparent text-neutral-700 dark:text-neutral-300 text-xs font-medium hover:bg-neutral-100 dark:hover:bg-neutral-700 transition-all text-left">
						<span class="flex items-center gap-2">
							<i data-lucide="download" class="w-3.5 h-3.5 text-neutral-400 dark:text-neutral-500"></i>
							<span>Export</span>
						</span>
						<i data-lucide="chevron-right" class="w-3 h-3 text-neutral-300 dark:text-neutral-600"></i>
					</button>
					<div class="submenu-content absolute left-[calc(100%+6px)] bottom-0 min-w-[120px] bg-white/95 dark:bg-neutral-800/95 backdrop-blur-glass border border-black/[0.05] dark:border-white/10 rounded-lg shadow-md p-1 opacity-0 invisible -translate-x-2 transition-all duration-200 transition-spring">
						<button id="exportPptx"
							class="flex items-center gap-2 w-full px-2.5 py-2 rounded bg-transparent text-neutral-700 dark:text-neutral-300 text-xs font-medium hover:bg-neutral-100 dark:hover:bg-neutral-700 transition-all text-left">
							<i data-lucide="presentation" class="w-3.5 h-3.5 text-neutral-400 dark:text-neutral-500"></i>
							<span>PowerPoint</span>
						</button>
						<button id="exportPdf"
							class="flex items-center gap-2 w-full px-2.5 py-2 rounded bg-transparent text-neutral-700 dark:text-neutral-300 text-xs font-medium hover:bg-neutral-100 dark:hover:bg-neutral-700 transition-all text-left">
							<i data-lucide="file-text" class="w-3.5 h-3.5 text-neutral-400 dark:text-neutral-500"></i>
							<span>PDF</span>
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- PptxGenJS Library -->
	<script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
	<!-- jsPDF Library -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

	<script>
		lucide.createIcons();

		const slides = Array.from(document.querySelectorAll('.slide'));
		const prevBtn = document.getElementById('prevBtn');
		const nextBtn = document.getElementById('nextBtn');
		const prevArrow = document.getElementById('prevArrow');
		const nextArrow = document.getElementById('nextArrow');
		const currentSlideEl = document.getElementById('currentSlide');
		const totalSlidesEl = document.getElementById('totalSlides');
		const progressFill = document.getElementById('progressFill');
		const thumbnailsPanel = document.getElementById('thumbnailsPanel');
		const thumbnailToggle = document.getElementById('thumbnailToggle');
		const themeToggle = document.getElementById('themeToggle');
		const toolsBtn = document.getElementById('toolsBtn');
		const dropdown = toolsBtn.closest('.dropdown');
		const exportPptxBtn = document.getElementById('exportPptx');
		const exportPdfBtn = document.getElementById('exportPdf');
		const topCounter = document.getElementById('topCounter');

		let currentIndex = 0;
		let previousIndex = 0;
		let isAnimating = false;
		let thumbnailsVisible = false;
		let isDarkMode = false;

		totalSlidesEl.textContent = slides.length;
		createThumbnails();
		render();

		// Show top counter on hover
		document.body.addEventListener('mouseenter', () => {
			topCounter.style.opacity = '1';
		});
		document.body.addEventListener('mouseleave', () => {
			topCounter.style.opacity = '0';
		});

		// Show arrows on mousemove
		let hideArrowsTimeout;
		document.body.addEventListener('mousemove', () => {
			prevArrow.style.opacity = '1';
			nextArrow.style.opacity = '1';
			
			clearTimeout(hideArrowsTimeout);
			hideArrowsTimeout = setTimeout(() => {
				if (!prevArrow.matches(':hover') && !nextArrow.matches(':hover')) {
					prevArrow.style.opacity = '0';
					nextArrow.style.opacity = '0';
				}
			}, 2000);
		});

		// Keep arrows visible on hover
		[prevArrow, nextArrow].forEach(arrow => {
			arrow.addEventListener('mouseenter', () => {
				clearTimeout(hideArrowsTimeout);
				arrow.style.opacity = '1';
			});
		});

		let draggedThumbIndex = null;
		let autoScrollInterval = null;
		const SCROLL_ZONE = 40;
		const SCROLL_SPEED = 8;

		function startAutoScroll(direction) {
			stopAutoScroll();
			autoScrollInterval = setInterval(() => {
				thumbnailsPanel.scrollLeft += direction * SCROLL_SPEED;
			}, 16);
		}

		function stopAutoScroll() {
			if (autoScrollInterval) {
				clearInterval(autoScrollInterval);
				autoScrollInterval = null;
			}
		}

		function createThumbnails() {
			thumbnailsPanel.innerHTML = '';
			slides.forEach((slide, i) => {
				const thumb = document.createElement('div');
				thumb.className = 'thumb-item flex-shrink-0 w-12 h-7 md:w-16 md:h-9 rounded overflow-hidden border border-transparent opacity-40 bg-neutral-100 dark:bg-neutral-700 hover:opacity-70 hover:scale-105 transition-all';
				thumb.draggable = true;
				thumb.dataset.index = i;
				thumb.innerHTML = slide.innerHTML;
				thumb.querySelector('img').className = 'w-full h-full object-cover pointer-events-none';
				thumb.addEventListener('click', (e) => {
					if (draggedThumbIndex === null) goTo(i);
				});
				thumb.addEventListener('dragstart', handleDragStart);
				thumb.addEventListener('dragend', handleDragEnd);
				thumb.addEventListener('dragover', handleDragOver);
				thumb.addEventListener('dragenter', handleDragEnter);
				thumb.addEventListener('dragleave', handleDragLeave);
				thumb.addEventListener('drop', handleDrop);
				thumbnailsPanel.appendChild(thumb);
			});
		}

		function handleDragStart(e) {
			const thumb = e.currentTarget;
			draggedThumbIndex = parseInt(thumb.dataset.index);
			thumb.classList.add('dragging');
			e.dataTransfer.effectAllowed = 'move';
			e.dataTransfer.setData('text/plain', draggedThumbIndex);
		}

		function handleDragEnd(e) {
			stopAutoScroll();
			e.currentTarget.classList.remove('dragging');
			document.querySelectorAll('.thumb-item').forEach(t => t.classList.remove('drag-over'));
			setTimeout(() => { draggedThumbIndex = null; }, 0);
		}

		function handleDragOver(e) {
			e.preventDefault();
			e.dataTransfer.dropEffect = 'move';

			const rect = thumbnailsPanel.getBoundingClientRect();
			const mouseX = e.clientX;

			if (mouseX < rect.left + SCROLL_ZONE) {
				startAutoScroll(-1);
			} else if (mouseX > rect.right - SCROLL_ZONE) {
				startAutoScroll(1);
			} else {
				stopAutoScroll();
			}
		}

		function handleDragEnter(e) {
			e.preventDefault();
			const target = e.target.closest('.thumb-item');
			if (target && parseInt(target.dataset.index) !== draggedThumbIndex) {
				target.classList.add('drag-over');
			}
		}

		function handleDragLeave(e) {
			const target = e.target.closest('.thumb-item');
			if (target) target.classList.remove('drag-over');
		}

		function handleDrop(e) {
			e.preventDefault();
			const target = e.target.closest('.thumb-item');
			if (!target) return;
			const dropIndex = parseInt(target.dataset.index);
			if (dropIndex === draggedThumbIndex) return;
			reorderSlides(draggedThumbIndex, dropIndex);
		}

		function reorderSlides(fromIndex, toIndex) {
			const slideWrapper = document.getElementById('slideWrapper');
			const [movedSlide] = slides.splice(fromIndex, 1);
			slides.splice(toIndex, 0, movedSlide);

			slides.forEach((slide, i) => {
				slide.dataset.index = i;
				slideWrapper.appendChild(slide);
			});

			if (currentIndex === fromIndex) {
				currentIndex = toIndex;
			} else if (fromIndex < currentIndex && toIndex >= currentIndex) {
				currentIndex--;
			} else if (fromIndex > currentIndex && toIndex <= currentIndex) {
				currentIndex++;
			}

			createThumbnails();
			render();
		}

		function render() {
			slides.forEach((slide, i) => {
				slide.classList.remove('active', 'exit-left');
				if (i === currentIndex) {
					slide.classList.add('active');
				} else if (i === previousIndex && previousIndex < currentIndex) {
					slide.classList.add('exit-left');
				}
			});

			const thumbs = thumbnailsPanel.querySelectorAll('.thumb-item');
			thumbs.forEach((thumb, i) => {
				if (i === currentIndex) {
					thumb.classList.add('!border-neutral-800', 'dark:!border-neutral-200', '!opacity-100', '!scale-105');
				} else {
					thumb.classList.remove('!border-neutral-800', 'dark:!border-neutral-200', '!opacity-100', '!scale-105');
				}
			});

			currentSlideEl.textContent = currentIndex + 1;
			progressFill.style.width = `${((currentIndex + 1) / slides.length) * 100}%`;

			const atStart = currentIndex === 0;
			const atEnd = currentIndex === slides.length - 1;
			prevBtn.disabled = atStart;
			nextBtn.disabled = atEnd;
			prevArrow.disabled = atStart;
			nextArrow.disabled = atEnd;
		}

		function goTo(index) {
			if (isAnimating || index === currentIndex) return;
			if (index < 0 || index >= slides.length) return;

			isAnimating = true;
			previousIndex = currentIndex;
			currentIndex = index;
			render();

			setTimeout(() => {
				isAnimating = false;
			}, 500);
		}

		function next() {
			if (currentIndex < slides.length - 1) goTo(currentIndex + 1);
		}

		function prev() {
			if (currentIndex > 0) goTo(currentIndex - 1);
		}

		function toggleThumbnails() {
			thumbnailsVisible = !thumbnailsVisible;
			thumbnailsPanel.classList.toggle('visible', thumbnailsVisible);
			closeDropdown();
		}

		function toggleTheme() {
			isDarkMode = !isDarkMode;
			if (isDarkMode) {
				document.documentElement.classList.add('dark');
				themeToggle.innerHTML = '<i data-lucide="sun" class="w-3.5 h-3.5 text-neutral-400 dark:text-neutral-500"></i><span>Light Mode</span>';
			} else {
				document.documentElement.classList.remove('dark');
				themeToggle.innerHTML = '<i data-lucide="moon" class="w-3.5 h-3.5 text-neutral-400 dark:text-neutral-500"></i><span>Dark Mode</span>';
			}
			lucide.createIcons();
			closeDropdown();
		}

		function toggleDropdown() {
			dropdown.classList.toggle('open');
		}

		function closeDropdown() {
			dropdown.classList.remove('open');
		}

		async function imageUrlToBase64(url) {
			try {
				const response = await fetch(url);
				const blob = await response.blob();
				return new Promise((resolve, reject) => {
					const reader = new FileReader();
					reader.onloadend = () => resolve(reader.result);
					reader.onerror = reject;
					reader.readAsDataURL(blob);
				});
			} catch (error) {
				console.error('Failed to load image:', url, error);
				return null;
			}
		}

		async function exportToPptx() {
			exportPptxBtn.disabled = true;
			try {
				const pptx = new PptxGenJS();
				pptx.layout = 'LAYOUT_16x9';
				pptx.title = document.title || 'Presentation';
				pptx.author = 'Flowith';

				const imageUrls = slides.map(slide => slide.querySelector('img')?.src).filter(Boolean);

				for (let i = 0; i < imageUrls.length; i++) {
					const slide = pptx.addSlide();
					try {
						const base64 = await imageUrlToBase64(imageUrls[i]);
						if (base64) {
							slide.addImage({ data: base64, x: 0, y: 0, w: '100%', h: '100%', sizing: { type: 'cover', w: '100%', h: '100%' } });
						}
					} catch (err) {
						console.error('Error adding slide', i, err);
						slide.addText(`Slide ${i + 1}`, { x: 1, y: 2.5, w: 8, h: 1, fontSize: 24, align: 'center' });
					}
				}

				await pptx.writeFile({ fileName: `${document.title || 'presentation'}.pptx` });
			} catch (error) {
				console.error('Export failed:', error);
				alert('Export failed. Please try again.');
			} finally {
				exportPptxBtn.disabled = false;
				closeDropdown();
			}
		}

		async function exportToPdf() {
			exportPdfBtn.disabled = true;
			try {
				const { jsPDF } = window.jspdf;
				const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [338.67, 190.5] });
				const imageUrls = slides.map(slide => slide.querySelector('img')?.src).filter(Boolean);

				for (let i = 0; i < imageUrls.length; i++) {
					if (i > 0) pdf.addPage([338.67, 190.5], 'landscape');
					try {
						const base64 = await imageUrlToBase64(imageUrls[i]);
						if (base64) pdf.addImage(base64, 'JPEG', 0, 0, 338.67, 190.5);
					} catch (err) {
						console.error('Error adding page', i, err);
						pdf.setFontSize(24);
						pdf.text(`Slide ${i + 1}`, 169.33, 95.25, { align: 'center' });
					}
				}

				pdf.save(`${document.title || 'presentation'}.pdf`);
			} catch (error) {
				console.error('PDF export failed:', error);
				alert('PDF export failed. Please try again.');
			} finally {
				exportPdfBtn.disabled = false;
				closeDropdown();
			}
		}

		prevBtn.addEventListener('click', prev);
		nextBtn.addEventListener('click', next);
		prevArrow.addEventListener('click', prev);
		nextArrow.addEventListener('click', next);
		thumbnailToggle.addEventListener('click', toggleThumbnails);
		themeToggle.addEventListener('click', toggleTheme);
		toolsBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown(); });
		exportPptxBtn.addEventListener('click', exportToPptx);
		exportPdfBtn.addEventListener('click', exportToPdf);

		thumbnailsPanel.addEventListener('dragover', (e) => {
			if (draggedThumbIndex === null) return;
			e.preventDefault();
			const rect = thumbnailsPanel.getBoundingClientRect();
			const mouseX = e.clientX;
			if (mouseX < rect.left + SCROLL_ZONE) {
				startAutoScroll(-1);
			} else if (mouseX > rect.right - SCROLL_ZONE) {
				startAutoScroll(1);
			} else {
				stopAutoScroll();
			}
		});
		thumbnailsPanel.addEventListener('dragleave', (e) => {
			if (!thumbnailsPanel.contains(e.relatedTarget)) {
				stopAutoScroll();
			}
		});

		document.addEventListener('click', (e) => {
			if (!dropdown.contains(e.target)) closeDropdown();
			if (thumbnailsVisible && !thumbnailsPanel.contains(e.target) && !dropdown.contains(e.target)) {
				thumbnailsVisible = false;
				thumbnailsPanel.classList.remove('visible');
			}
		});

		document.addEventListener('keydown', (e) => {
			switch(e.key) {
				case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
				case 'ArrowLeft': case 'PageUp': e.preventDefault(); prev(); break;
				case 'Home': e.preventDefault(); goTo(0); break;
				case 'End': e.preventDefault(); goTo(slides.length - 1); break;
				case 't': case 'T': e.preventDefault(); toggleThumbnails(); break;
				case 'Escape':
					closeDropdown();
					if (thumbnailsVisible) { thumbnailsVisible = false; thumbnailsPanel.classList.remove('visible'); }
					break;
			}
		});

		let touchStartX = 0, touchStartY = 0;
		document.addEventListener('touchstart', (e) => {
			touchStartX = e.changedTouches[0]?.screenX || 0;
			touchStartY = e.changedTouches[0]?.screenY || 0;
		}, { passive: true });

		document.addEventListener('touchend', (e) => {
			const endX = e.changedTouches[0]?.screenX || 0;
			const endY = e.changedTouches[0]?.screenY || 0;
			const deltaX = endX - touchStartX;
			const deltaY = endY - touchStartY;
			if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
				deltaX < 0 ? next() : prev();
			}
		}, { passive: true });

		slides.forEach(slide => {
			slide.addEventListener('click', (e) => {
				const rect = slide.getBoundingClientRect();
				const clickX = e.clientX - rect.left;
				clickX > rect.width / 2 ? next() : prev();
			});
		});
	</script>
</body>
</html>
